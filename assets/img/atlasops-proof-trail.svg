<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">AtlasOps proof trail</title>
  <desc id="desc">A proof trail from intake to payment proof, delivery lock, report, and memory.</desc>
  <rect width="960" height="540" rx="24" fill="#07111f"/>
  <path d="M122 270h716" stroke="#294662" stroke-width="7" stroke-linecap="round"/>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    <g transform="translate(140 270)"><circle r="48" fill="#10243a" stroke="#35d7ff" stroke-width="4"/><text y="-4" font-size="16" font-weight="900" fill="#fff">Intake</text><text y="20" font-size="12" fill="#b9c7db">scope</text></g>
    <g transform="translate(300 270)"><circle r="48" fill="#10243a" stroke="#35d7ff" stroke-width="4"/><text y="-4" font-size="16" font-weight="900" fill="#fff">Payment</text><text y="20" font-size="12" fill="#b9c7db">proof</text></g>
    <g transform="translate(480 270)"><circle r="58" fill="#14371f" stroke="#48d597" stroke-width="5"/><text y="-4" font-size="17" font-weight="900" fill="#fff">Delivery</text><text y="20" font-size="12" fill="#c7f7e4">unlocks</text></g>
    <g transform="translate(660 270)"><circle r="48" fill="#10243a" stroke="#35d7ff" stroke-width="4"/><text y="-4" font-size="16" font-weight="900" fill="#fff">Report</text><text y="20" font-size="12" fill="#b9c7db">links</text></g>
    <g transform="translate(820 270)"><circle r="48" fill="#10243a" stroke="#f5b84b" stroke-width="4"/><text y="-4" font-size="16" font-weight="900" fill="#fff">Memory</text><text y="20" font-size="12" fill="#ffe2a1">lesson</text></g>
  </g>
  <text x="72" y="92" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="900" fill="#fff">Proof before claims.</text>
  <text x="72" y="130" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#b9c7db">AtlasOps does not count redirects as payments, drafts as sends, or unlocked delivery without matching proof.</text>
</svg>
