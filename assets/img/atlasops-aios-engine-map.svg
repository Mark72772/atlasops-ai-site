<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Atlas AIOS engine map</title>
  <desc id="desc">A map of Atlas AIOS lanes for agents, memory, proof, revenue, learning, and build work.</desc>
  <rect width="960" height="540" rx="24" fill="#07111f"/>
  <circle cx="480" cy="270" r="98" fill="#10243a" stroke="#35d7ff" stroke-width="4"/>
  <text x="480" y="258" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="900" fill="#fff">Atlas AIOS</text>
  <text x="480" y="294" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" fill="#b9c7db">context -> action -> proof</text>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="850" font-size="20" fill="#f8fbff">
    <g transform="translate(80 88)"><rect width="190" height="78" rx="10" fill="#0f2338" stroke="#294662"/><text x="24" y="46">Agents</text></g>
    <g transform="translate(690 88)"><rect width="190" height="78" rx="10" fill="#0f2338" stroke="#294662"/><text x="24" y="46">Memory</text></g>
    <g transform="translate(80 372)"><rect width="190" height="78" rx="10" fill="#0f2338" stroke="#294662"/><text x="24" y="46">Revenue</text></g>
    <g transform="translate(690 372)"><rect width="190" height="78" rx="10" fill="#0f2338" stroke="#294662"/><text x="24" y="46">Learning</text></g>
    <g transform="translate(385 58)"><rect width="190" height="78" rx="10" fill="#0f2338" stroke="#294662"/><text x="24" y="46">Proof</text></g>
    <g transform="translate(385 404)"><rect width="190" height="78" rx="10" fill="#0f2338" stroke="#294662"/><text x="24" y="46">Build</text></g>
  </g>
  <g stroke="#35d7ff" stroke-width="3" stroke-linecap="round" opacity=".7">
    <path d="M270 127l138 90"/><path d="M690 127l-138 90"/><path d="M480 136v36"/><path d="M270 411l138-90"/><path d="M690 411l-138-90"/><path d="M480 404v-36"/>
  </g>
  <g fill="#48d597"><circle cx="480" cy="172" r="6"/><circle cx="408" cy="217" r="6"/><circle cx="552" cy="217" r="6"/><circle cx="408" cy="321" r="6"/><circle cx="552" cy="321" r="6"/><circle cx="480" cy="368" r="6"/></g>
  <text x="60" y="500" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" fill="#b9c7db">Specialist lanes keep public answers, proof, revenue work, learning, and build tasks from becoming one generic status dump.</text>
</svg>
