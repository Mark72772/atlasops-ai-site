name = "atlasops-stripe-gateway"
main = "worker.js"
compatibility_date = "2026-05-19"

[vars]
STRIPE_MODE = "test"
STRIPE_LIVE_CHECKOUT_APPROVED = "false"
ALLOWED_ORIGIN = "https://atlasops.io,https://www.atlasops.io,https://mark72772.github.io"
STRIPE_SUCCESS_BASE_URL = "https://mark72772.github.io/atlasops-ai-site"
STRIPE_CANCEL_BASE_URL = "https://mark72772.github.io/atlasops-ai-site"

# Configure in Cloudflare, not in this file:
# wrangler secret put STRIPE_SECRET_KEY
# wrangler secret put STRIPE_WEBHOOK_SECRET
# wrangler secret put ATLAS_RELAY_SECRET
# Optional public value:
# wrangler secret put STRIPE_PUBLISHABLE_KEY

# Preferred durable evidence store:
[[kv_namespaces]]
binding = "ATLAS_PAYMENTS"
id = "f9f5ea1f8d00412c92695a35b2851387"
